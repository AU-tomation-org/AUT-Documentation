# =============================================================================
# TwinCAT Build & Test — GitHub Actions CI/CD Workflow
# =============================================================================
#
# This workflow automates build, test, documentation generation, static
# analysis, and release publication for TwinCAT 3 PLC projects.
#
# REQUIREMENTS:
#   - Self-hosted runner 'win-twincat-01' with TwinCAT XAE installed
#   - TcCIBuilder.exe at C:\actions-runner\_tools\TcCIBuilder\
#   - Runner configured as an interactive Windows Task Scheduler task
#     (NOT as a Windows Service — TwinCAT COM requires an interactive session)
#   - See: CI-CD-GitHub-TwinCAT-Self-Hosted-Runner/README.md
#
# PRODUCED ARTIFACTS:
#   - build-logs          : Full TcCIBuilder console output
#   - tcunit-results      : TcUnit XML test results (if tests ran)
#   - static-analysis     : SARIF file from TwinCAT static analyzer
#   - boot-project        : Compiled TwinCAT boot project image
#
# SIDE EFFECTS:
#   - Pushes generated documentation to the gh-pages branch (GitHub Pages)
#   - Creates GitHub Releases for any compiled library files found
# =============================================================================

name: TwinCAT Build & Test

on:
  push:
    branches: [ master ]    # Trigger on every push to master
  workflow_dispatch:         # Allow manual trigger from the GitHub Actions UI

jobs:
  build:
    # -------------------------------------------------------------------------
    # RUNNER SELECTION
    # GitHub-hosted runners CANNOT be used for TwinCAT because:
    #   1. TcCIBuilder uses TwinCAT's COM automation (requires local TwinCAT XAE)
    #   2. TwinCAT licenses are machine-bound
    #   3. UmRT must be running locally for test execution
    # The runner is win-twincat-01 on DESKTOP-GQKMFOA (AU-tomation-org).
    # -------------------------------------------------------------------------
    runs-on: [self-hosted, windows, twincat]

    env:
      # Must match the .sln filename (without extension) and the root folder name
      SOLUTION_NAME: TestTE1030TcDocGenMarkup
      BUILD_CONFIG: Release
      # Standard TwinCAT 3 build platform identifier
      BUILD_PLATFORM: TwinCAT OS (x64)

    permissions:
      contents: write        # Required for git push to gh-pages branch
      checks: write          # Required for TcUnit test report UI (GitHub Checks)
      security-events: write # Required for SARIF upload to Code Scanning
      actions: read          # Required for CodeQL upload-sarif telemetry

    steps:

      # =======================================================================
      # STEP 1 — Checkout repository
      # =======================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # clean: false keeps the workspace between runs for faster incremental
          # builds. Git handles the diff update. Set to true only if you suspect
          # workspace corruption (stale files causing build errors).
          clean: false

      # =======================================================================
      # STEP 2 — Execute TcCIBuilder
      # =======================================================================
      # TcCIBuilder.exe drives TwinCAT XAE via COM automation to:
      #   1. Open the .sln solution file in the TwinCAT XAE shell
      #   2. Build the PLC project (generates .compiled-library if applicable)
      #   3. Generate TcDocGen HTML documentation (if doc projects present)
      #   4. Run TcUnit tests on the runtime (if test FB_* blocks present)
      #   5. Export static analysis results as a SARIF JSON file
      #   6. Set the AmsNetId for the target runtime in the project
      #
      # TcCIBuilder output files (written to github.workspace):
      #   build.log                         -- full console output
      #   TcUnit_Results.xml                -- JUnit-format test results
      #   <SOLUTION_NAME>.sarif.json        -- static analysis findings
      #   docs/<SOLUTION_NAME>/             -- generated HTML documentation
      #
      # NOTE: TcCIBuilder requires TwinCAT to be in an interactive user session.
      # Running the runner as a Windows Service causes E_ACCESSDENIED (0x80070005)
      # on the COM factory call. See README.md for the architecture decision.
      # =======================================================================
      - name: Execute TcCIBuilder
        shell: powershell
        run: |
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          $solutionPath = "${{ github.workspace }}\${{ env.SOLUTION_NAME }}.sln"
          & $toolPath "$solutionPath" "${{ env.BUILD_CONFIG }}" "${{ env.BUILD_PLATFORM }}" | Tee-Object -FilePath "build.log"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "TcCIBuilder failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      # =======================================================================
      # STEP 3 — Upload build log
      # =======================================================================
      # Uploaded unconditionally (if: always()) so the log is available even
      # when the build fails. Essential for diagnosing TcCIBuilder errors.
      # =======================================================================
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log

      # =======================================================================
      # STEP 4 — Upload TcUnit test results
      # =======================================================================
      # TcUnit_Results.xml is produced only when test function blocks (FB_*)
      # exist in the solution AND the project has been executed on the runtime.
      # If the file is missing, this step issues a warning but does not fail.
      # =======================================================================
      - name: Upload Test Results XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcunit-results
          path: ${{ github.workspace }}\TcUnit_Results.xml

      # =======================================================================
      # STEP 5 — Publish TcUnit test report to GitHub UI
      # =======================================================================
      # Parses TcUnit_Results.xml (JUnit format) and creates a visual test
      # report visible under the GitHub Actions run → "Checks" tab.
      # If no tests ran, it posts an empty report (not a failure).
      # =======================================================================
      - name: Publish Test Report UI
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/TcUnit_Results.xml'
          check_name: 'TcUnit Execution Report'
          include_passed: true
          annotate_only: false
          detailed_summary: true

      # =======================================================================
      # STEP 6 — Upload static analysis SARIF
      # =======================================================================
      # Uploads the .sarif.json as a plain artifact for manual download.
      # The SARIF file contains static analysis findings from TwinCAT's
      # built-in analyzer. Requires TE1200 full license for metrics export.
      # =======================================================================
      - name: Upload Static Analysis Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: ${{ github.workspace }}\*.sarif.json

      # =======================================================================
      # STEP 7 — Upload SARIF to GitHub Code Scanning
      # =======================================================================
      # Sends static analysis findings to GitHub's Code Scanning dashboard,
      # visible under the repository Security tab.
      #
      # PREREQUISITE: GitHub Code Security must be enabled on the repository:
      #   Repository → Settings → Code security → Enable Code scanning
      #
      # continue-on-error: true makes this step non-blocking. If Code Security
      # is not enabled, the workflow proceeds and completes successfully.
      # =======================================================================
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}\${{ env.SOLUTION_NAME }}.sarif.json
          category: twincat-static-analysis

      # =======================================================================
      # STEP 8 — Upload boot project
      # =======================================================================
      # Archives the compiled TwinCAT boot project (the binary image that the
      # TwinCAT runtime loads). Location is the UmRT_Default runtime folder.
      # Only uploaded on build success (if: success()).
      # =======================================================================
      - name: Upload Boot Project
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: boot-project
          path: C:\ProgramData\Beckhoff\TwinCAT\3.1\Runtimes\UmRT_Default\3.1\Boot\**

      # =======================================================================
      # STEP 9 — Deploy documentation to gh-pages
      # =======================================================================
      # Publishes the TcDocGen-generated HTML documentation to the gh-pages
      # branch, which is served by GitHub Pages at:
      #   https://au-tomation-org.github.io/<repo-name>/
      #
      # Logic:
      #   1. Clones the gh-pages branch (creates it as orphan if it doesn't exist)
      #   2. Copies the docs/ folder into the clone
      #   3. Commits and pushes only if there are actual changes (idempotent)
      #
      # The GITHUB_TOKEN has contents:write permission (set above).
      # git user is set to github-actions[bot] for the commit authorship.
      # =======================================================================
      - name: Deploy documentation to gh-pages
        if: success()
        shell: powershell
        run: |
          $docsSource = "${{ github.workspace }}\docs"
          $tmpDir = "C:\actions-runner\_work\_gh_pages_tmp"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $repoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if (Test-Path $tmpDir) { Remove-Item $tmpDir -Recurse -Force }
          New-Item $tmpDir -ItemType Directory | Out-Null

          $branchExists = git ls-remote --heads origin gh-pages
          if ($branchExists) {
            git clone --branch gh-pages --single-branch $repoUrl $tmpDir
          } else {
            git clone $repoUrl $tmpDir
            Set-Location $tmpDir
            git checkout --orphan gh-pages
            git rm -rf . 2>$null
            Set-Location "${{ github.workspace }}"
          }

          Copy-Item -Path "$docsSource\*" -Destination $tmpDir -Recurse -Force

          Set-Location $tmpDir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false

          git add -A
          $status = git status --porcelain
          if ($status) {
            git commit -m "docs: update documentation from $sha"
            git push origin gh-pages
            Write-Host "Documentation deployed to gh-pages."
          } else {
            Write-Host "No documentation changes to deploy."
          }

          Set-Location "${{ github.workspace }}"
          Remove-Item $tmpDir -Recurse -Force

      # =======================================================================
      # STEP 10 — Publish library releases
      # =======================================================================
      # Scans the repository for compiled TwinCAT library files
      # (*.library, *.compiled-library), excluding _Libraries/ dependency folders.
      #
      # For each library found:
      #   1. Reads the version from the corresponding .plcproj file
      #      (ProjectVersion XML element)
      #   2. Creates a GitHub Release tagged "<LibraryName>-v<Version>"
      #      if it does not already exist
      #   3. Uploads the library file to the release (--clobber overwrites)
      #
      # If no library files are found, the step is silently skipped.
      # GH_TOKEN is required for the `gh` CLI release commands.
      # =======================================================================
      - name: Publish Library Releases
        if: success()
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $libraries = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Include "*.library","*.compiled-library" | Where-Object { $_.DirectoryName -notlike "*_Libraries*" }

          if (-not $libraries) {
            Write-Host "No library files found - skipping release publishing."
            exit 0
          }

          foreach ($lib in $libraries) {
            $libName = $lib.BaseName

            $plcprojFile = Get-ChildItem -Path $lib.DirectoryName -Recurse -Filter "*.plcproj" | Select-Object -First 1
            if (-not $plcprojFile) {
              Write-Warning "No .plcproj found alongside $($lib.Name) - skipping."
              continue
            }

            [xml]$plcproj = Get-Content $plcprojFile.FullName
            $version = $plcproj.SelectSingleNode("//*[local-name()='ProjectVersion']").InnerText
            if (-not $version) {
              Write-Warning "ProjectVersion not found in $($plcprojFile.Name) - skipping."
              continue
            }

            $tag = "$libName-v$version"
            Write-Host "Publishing: $tag -> $($lib.Name)"

            $releaseExists = & { $ErrorActionPreference = 'SilentlyContinue'; gh release view $tag --json tagName 2>$null }
            if (-not $releaseExists) {
              gh release create $tag --title "$libName v$version" --notes "Automated release from ${{ github.sha }}."
            }

            gh release upload $tag "$($lib.FullName)" --clobber
            Write-Host "Done: $tag"
          }

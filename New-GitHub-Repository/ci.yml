# ──────────────────────────────────────────────────────────────────────────────
# CI/CD template for TwinCAT 3 projects with:
#   - TcUnit test execution on UmRT target
#   - TcDocGen documentation deployed to gh-pages
#   - TwinCAT library release (.library + .compiled-library)
#   - Optional C# Windows service release (.zip)
#   - SARIF static analysis upload to GitHub Code Scanning
#
# SOLUTION_NAME is auto-detected from the .sln file in the repository root.
# SARIF file name is auto-detected after TcCIBuilder runs.
# C# project is auto-detected from .csproj files; no manual configuration needed.
# ──────────────────────────────────────────────────────────────────────────────

name: Build, Test & Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, windows, twincat]

    env:
      BUILD_CONFIG:   Release
      BUILD_PLATFORM: TwinCAT OS (x64)

    permissions:
      contents: write
      checks: write
      security-events: write
      actions: read
      pages: write

    steps:

      # ── 1 · Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      # ── 2 · Auto-detect solution name ───────────────────────────────────────
      # Reads the .sln file name from the repository root and exports SOLUTION_NAME
      # to the job environment for all subsequent steps.
      - name: Find solution file
        shell: powershell
        run: |
          $sln = Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.sln" | Select-Object -First 1
          if (-not $sln) { Write-Error "No .sln file found in repository root"; exit 1 }
          "SOLUTION_NAME=$($sln.BaseName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "Found solution: $($sln.Name)"

      # ── 3 · Detect C# project ───────────────────────────────────────────────
      # Searches for a .csproj file and sets HAS_CSHARP, CSPROJ_PATH, and
      # SERVICE_PUBLISH_DIR in the job environment. Steps 4, 5, and 17 run only
      # when HAS_CSHARP is 'true'.
      - name: Detect C# project
        shell: powershell
        run: |
          $csproj = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter "*.csproj" | Select-Object -First 1
          if ($csproj) {
            $relPath    = $csproj.FullName.Substring("${{ github.workspace }}".Length).TrimStart('\', '/')
            $publishDir = "publish\$($csproj.BaseName)"
            "HAS_CSHARP=true"                 | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            "CSPROJ_PATH=$relPath"            | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            "SERVICE_PUBLISH_DIR=$publishDir" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            Write-Host "C# project detected: $relPath"
          } else {
            "HAS_CSHARP=false" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            Write-Host "No C# project found - steps 4, 5, and 17 will be skipped."
          }

      # ── 4 · Build & publish C# Windows service ──────────────────────────────
      - name: Publish C# service
        if: env.HAS_CSHARP == 'true'
        shell: powershell
        run: |
          dotnet publish "${{ env.CSPROJ_PATH }}" `
            --configuration Release `
            --output "${{ env.SERVICE_PUBLISH_DIR }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 5 · Zip C# service ──────────────────────────────────────────────────
      - name: Zip C# service
        if: env.HAS_CSHARP == 'true'
        shell: powershell
        run: |
          $zip = "${{ env.SOLUTION_NAME }}-service-win-x64.zip"
          Compress-Archive -Path "${{ env.SERVICE_PUBLISH_DIR }}\*" -DestinationPath $zip -Force
          Write-Host "Created: $zip"

      # ── 6 · Ensure TwinCAT UmRT is running ──────────────────────────────────
      - name: Ensure TwinCAT UmRT is running
        shell: powershell
        run: |
          $startBat = 'C:\ProgramData\Beckhoff\TwinCAT\3.1\Runtimes\UmRT_Default\Start.bat'

          $proc = Get-Process TcSystemServiceUm -ErrorAction SilentlyContinue
          if ($proc) {
            Write-Host "UmRT already running (PID $($proc.Id))."
          } else {
            Write-Host "UmRT not running - starting..."
            Start-Process cmd.exe -ArgumentList "/c ""$startBat""" -WorkingDirectory (Split-Path $startBat) -WindowStyle Hidden
          }

          $deadline = (Get-Date).AddSeconds(30)
          do {
            Start-Sleep -Seconds 2
            $proc = Get-Process TcSystemServiceUm -ErrorAction SilentlyContinue
          } while (-not $proc -and (Get-Date) -lt $deadline)

          if (-not $proc) {
            Write-Error "UmRT did not start within 30 s."
            exit 1
          }
          Write-Host "UmRT is running (PID $($proc.Id))."

      # ── 7 · Execute TcCIBuilder (library build + docs + tests + SARIF) ──────
      - name: Execute TcCIBuilder
        shell: powershell
        run: |
          $toolPath = "C:\actions-runner\_tools\TcCIBuilder\TcCIBuilder.exe"
          $solutionPath = "${{ github.workspace }}\${{ env.SOLUTION_NAME }}.sln"
          & $toolPath "$solutionPath" "${{ env.BUILD_CONFIG }}" "${{ env.BUILD_PLATFORM }}" | Tee-Object -FilePath "build.log"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "TcCIBuilder failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      # ── 8 · Auto-detect SARIF file ──────────────────────────────────────────
      # TcCIBuilder names the SARIF file after the library PLC project, which may
      # differ from the solution name. This step finds the generated file and
      # exports SARIF_FILE for the upload step.
      - name: Find SARIF file
        if: always()
        shell: powershell
        run: |
          $sarif = Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.sarif.json" | Select-Object -First 1
          if ($sarif) {
            "SARIF_FILE=$($sarif.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            Write-Host "Found SARIF: $($sarif.Name)"
          } else {
            "SARIF_FILE=" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            Write-Host "No SARIF file found - upload step will be skipped."
          }

      # ── 9 · Upload build log ─────────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log

      # ── 10 · Upload TcUnit results ───────────────────────────────────────────
      - name: Upload TcUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcunit-results
          path: ${{ github.workspace }}\TcUnit_Results.xml

      # ── 11 · Publish TcUnit test report to GitHub UI ────────────────────────
      - name: Publish TcUnit test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/TcUnit_Results.xml'
          check_name: TcUnit Execution Report
          include_passed: true
          detailed_summary: true

      # ── 12 · Upload SARIF artifact ───────────────────────────────────────────
      - name: Upload static analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: ${{ github.workspace }}\*.sarif.json

      # ── 13 · Upload SARIF to GitHub Code Scanning ───────────────────────────
      # Requires Code Scanning enabled in repo Settings > Code security.
      # Skipped automatically when no SARIF file was produced by TcCIBuilder.
      - name: Upload SARIF to Code Scanning
        if: always() && env.SARIF_FILE != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.SARIF_FILE }}
          category: twincat-static-analysis

      # ── 14 · Deploy TcDocGen documentation to gh-pages ──────────────────────
      - name: Deploy documentation to gh-pages
        if: success()
        shell: powershell
        run: |
          $docsSource = "${{ github.workspace }}\docs"
          $tmpDir     = "C:\actions-runner\_work\_gh_pages_tmp"
          $sha        = "${{ github.sha }}".Substring(0, 7)
          $repoUrl    = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if (Test-Path $tmpDir) { Remove-Item $tmpDir -Recurse -Force }
          New-Item $tmpDir -ItemType Directory | Out-Null

          $branchExists = git ls-remote --heads origin gh-pages
          if ($branchExists) {
            git clone --branch gh-pages --single-branch $repoUrl $tmpDir
          } else {
            git clone $repoUrl $tmpDir
            Set-Location $tmpDir
            git checkout --orphan gh-pages
            git rm -rf . 2>$null
            Set-Location "${{ github.workspace }}"
          }

          Copy-Item -Path "$docsSource\*" -Destination $tmpDir -Recurse -Force

          Set-Location $tmpDir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false
          git add -A
          $status = git status --porcelain
          if ($status) {
            git commit -m "docs: update from $sha"
            git push origin gh-pages
            Write-Host "Documentation deployed."
          } else {
            Write-Host "No documentation changes."
          }

          Set-Location "${{ github.workspace }}"
          Remove-Item $tmpDir -Recurse -Force

      # ── 15 · Enable GitHub Pages and set homepage URL (idempotent) ──────────
      # Requires pages: write permission.
      # On org repos GITHUB_TOKEN may still return 403 due to org policy - non-blocking.
      # One-time fallback via CLI:
      #   gh api repos/<org>/<repo>/pages -X POST -f 'source[branch]=gh-pages' -f 'source[path]=/'
      #   gh api repos/<org>/<repo> -X PATCH -f homepage='https://<org>.github.io/<repo>/'
      - name: Enable GitHub Pages and set homepage URL
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $repo = "${{ github.repository }}"
          $pagesUrl = "https://$($repo.Split('/')[0]).github.io/$($repo.Split('/')[1])/"
          gh api repos/$repo/pages -X POST -f 'source[branch]=gh-pages' -f 'source[path]=/' 2>$null | Out-Null
          gh api repos/$repo -X PATCH -f "homepage=$pagesUrl" --jq '.homepage'
          Write-Host "Pages and homepage configured: $pagesUrl"

      # ── 16 · Release TwinCAT library files (.library + .compiled-library) ───
      - name: Publish TwinCAT library releases
        if: success()
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $libs = Get-ChildItem -Path "${{ github.workspace }}" -Recurse `
                    -Include "*.library","*.compiled-library" |
                  Where-Object { $_.DirectoryName -notlike "*_Libraries*" }

          if (-not $libs) {
            Write-Host "No library files found - skipping."
            exit 0
          }

          $groups = $libs | Group-Object { $_.BaseName }

          foreach ($grp in $groups) {
            $libName = $grp.Name

            $plcproj = Get-ChildItem -Path "${{ github.workspace }}" -Recurse `
                         -Filter "*.plcproj" |
                       Where-Object { $_.DirectoryName -notlike "*_Libraries*" } |
                       Select-Object -First 1

            if (-not $plcproj) {
              Write-Warning "No .plcproj found for $libName - skipping."
              continue
            }

            [xml]$xml = Get-Content $plcproj.FullName
            $version  = $xml.SelectSingleNode("//*[local-name()='ProjectVersion']").InnerText
            if (-not $version) {
              Write-Warning "ProjectVersion not found in $($plcproj.Name) - skipping."
              continue
            }

            $tag = "$libName-v$version"
            Write-Host "Release: $tag"

            $exists = & { $ErrorActionPreference = 'SilentlyContinue'
                          gh release view $tag --json tagName 2>$null }
            if (-not $exists) {
              gh release create $tag `
                --title "$libName v$version" `
                --notes "TwinCAT 3 library - automated release from ${{ github.sha }}."
            }

            foreach ($f in $grp.Group) {
              gh release upload $tag "$($f.FullName)" --clobber
              Write-Host "  Uploaded: $($f.Name)"
            }
          }

      # ── 17 · Release C# Windows service ─────────────────────────────────────
      - name: Publish C# service release
        if: success() && env.HAS_CSHARP == 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [xml]$csproj = Get-Content "${{ env.CSPROJ_PATH }}"
          $version = $csproj.SelectSingleNode("//*[local-name()='Version']").InnerText
          if (-not $version) {
            Write-Warning "Version not found in .csproj - skipping service release."
            exit 0
          }

          $tag = "${{ env.SOLUTION_NAME }}-service-v$version"
          $zip = "${{ github.workspace }}\${{ env.SOLUTION_NAME }}-service-win-x64.zip"
          Write-Host "Release: $tag"

          $exists = & { $ErrorActionPreference = 'SilentlyContinue'
                        gh release view $tag --json tagName 2>$null }
          if (-not $exists) {
            gh release create $tag `
              --title "${{ env.SOLUTION_NAME }} Windows Service v$version" `
              --notes "Windows service - automated release from ${{ github.sha }}."
          }

          gh release upload $tag $zip --clobber
          Write-Host "Uploaded: ${{ env.SOLUTION_NAME }}-service-win-x64.zip"
